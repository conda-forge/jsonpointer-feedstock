schema_version: 1

context:
  name: jsonpointer
  version: "3.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/jsonpointer-${{ version }}.tar.gz
  sha256: f9b39abd59ba8c1de8a4ff16141605d2a8dacc4dd6cf399672cf237bfe47c211

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - jsonpointer

about:
  summary: Identify specific nodes in a JSON document (RFC 6901)
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/stefankoegl/python-json-pointer

extra:
  recipe-maintainers:
    - anguslees
    - xhochy
